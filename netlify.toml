[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

[functions.tcl]
  timeout = 26

# API temps réel (auth côté serveur via la fonction Netlify)
[[redirects]]
  from = "/api/tcl"
  to = "/.netlify/functions/tcl"
  status = 200
  force = true

# SPA React
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  targetPort = 5173
  publish = "dist"
  autoLaunch = false
